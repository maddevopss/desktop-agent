name: Inspect Windows artifact

description: Generate and upload a SHA-256 manifest for the Windows distribution artifact.

inputs:
  artifact-directory:
    description: Directory containing the Windows installer files.
    required: false
    default: dist-ci
  manifest-path:
    description: Output path for the generated JSON manifest.
    required: false
    default: dist-ci/artifact-manifest.json
  artifact-name:
    description: Uploaded GitHub Actions artifact name.
    required: false
    default: madsuite-windows-inspection

runs:
  using: composite
  steps:
    - name: Generate Windows artifact manifest
      shell: pwsh
      run: node scripts/inspect-windows-artifact.js "${{ inputs.artifact-directory }}" "${{ inputs.manifest-path }}"

    - name: Upload Windows installer and manifest
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.artifact-directory }}/*.exe
          ${{ inputs.artifact-directory }}/*.yml
          ${{ inputs.artifact-directory }}/*.yaml
          ${{ inputs.artifact-directory }}/*.blockmap
          ${{ inputs.manifest-path }}
        if-no-files-found: error
        retention-days: 14
