name: Desktop Agent Guards

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guards:
    name: Desktop agent guards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Desktop agent contract guard
        run: npm run guard:desktop-agent-contract

      - name: Syntax check
        run: npm run check:syntax

      - name: Unit tests
        run: npm test
